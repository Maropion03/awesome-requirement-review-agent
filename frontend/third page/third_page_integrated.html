<script>
const API_BASE = 'http://localhost:8000/api';
let sessionId = null;
let conversationHistory = [];

// ========== Init ==========
document.addEventListener('DOMContentLoaded', () => {
  sessionId = sessionStorage.getItem('lastSessionId') || getQueryParam('session');
  if (sessionId) {
    loadSessionData();
    loadInitialMessage();
  } else {
    addWelcomeMessage();
  }
  setupEventListeners();
});

// ========== Load Session Data ==========
async function loadSessionData() {
  if (!sessionId) return;

  try {
    // Try to get report for stats
    const reportRes = await fetch(`${API_BASE}/review/report/${sessionId}`);
    if (reportRes.ok) {
      const report = await reportRes.json();
      document.getElementById('totalScoreCard').textContent = Math.round(report.total_score || 0);
      document.getElementById('recommendationCard').textContent = report.recommendation || 'PENDING';
    }

    // Check session status
    const statusRes = await fetch(`${API_BASE}/review/status/${sessionId}`);
    if (statusRes.ok) {
      const status = await statusRes.json();
      updateSessionStatus(status.status);
    }
  } catch (e) {
    console.warn('Could not load session data:', e);
  }
}

function updateSessionStatus(status) {
  const dot = document.getElementById('sessionStatusDot');
  const text = document.getElementById('sessionStatusText');

  const statusMap = {
    'uploaded': { color: 'bg-yellow-400', text: '待开始' },
    'started': { color: 'bg-blue-400', text: '评审中' },
    'reviewing': { color: 'bg-blue-400', text: '评审中' },
    'completed': { color: 'bg-green-400', text: '已完成' },
    'error': { color: 'bg-red-400', text: '错误' }
  };

  const info = statusMap[status] || { color: 'bg-stone-400', text: status || '未知' };
  dot.className = `w-2 h-2 rounded-full ${info.color}`;
  if (info.color !== 'bg-blue-400') dot.classList.remove('animate-pulse');
  text.textContent = info.text;
}

// ========== Welcome Message ==========
function addWelcomeMessage() {
  const message = {
    id: 'welcome',
    role: 'assistant',
    content: '您好！我是您的 PRD 评审助手。请先在工作台创建评审任务，我会根据您的需求文档提供精准的分析反馈。',
    timestamp: new Date().toISOString()
  };
  addMessageToUI(message);
}

function loadInitialMessage() {
  // Load saved conversation or show welcome
  const saved = sessionStorage.getItem('conversationHistory');
  if (saved) {
    try {
      conversationHistory = JSON.parse(saved);
      conversationHistory.forEach(msg => addMessageToUI(msg, false));
    } catch (e) {}
  }

  if (conversationHistory.length === 0) {
    addWelcomeWithContext();
  }
}

async function addWelcomeWithContext() {
  if (!sessionId) return;

  try {
    const reportRes = await fetch(`${API_BASE}/review/report/${sessionId}`);
    if (reportRes.ok) {
      const report = await reportRes.json();
      const summary = report.summary || '';
      const score = report.total_score || 0;
      const rec = report.recommendation || '';

      const message = {
        id: 'welcome-' + Date.now(),
        role: 'assistant',
        content: `您好！我是您的 PRD 评审助手。当前评审已完成，综合评分 ${score}/100，建议：${rec}。${summary ? '摘要：' + summary.substring(0, 100) + '...' : ''}您可以针对具体问题继续追问。`,
        timestamp: new Date().toISOString()
      };
      addMessageToUI(message);
      conversationHistory.push(message);
      saveConversation();
    }
  } catch (e) {
    addWelcomeMessage();
  }
}

// ========== Send Message ==========
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const message = input.value.trim();

  if (!message) return;
  if (!sessionId) {
    alert('请先在工作台创建评审任务');
    return;
  }

  // Add user message
  const userMsg = {
    id: 'user-' + Date.now(),
    role: 'user',
    content: message,
    timestamp: new Date().toISOString()
  };
  addMessageToUI(userMsg);
  conversationHistory.push(userMsg);
  saveConversation();

  input.value = '';

  // Add loading indicator
  const loadingId = addLoadingMessage();

  try {
    const response = await fetch(`${API_BASE}/review/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        message: message,
        selected_issue_id: sessionStorage.getItem('selectedIssueId') || null,
        context_mode: 'default'
      })
    });

    removeLoadingMessage(loadingId);

    if (!response.ok) {
      throw new Error('Chat request failed');
    }

    const data = await response.json();
    const assistantMsg = {
      id: 'assistant-' + Date.now(),
      role: 'assistant',
      content: data.message || '抱歉，我暂时无法回答这个问题。',
      sourceRefs: data.source_refs || [],
      suggestedActions: data.suggested_actions || [],
      runState: data.run_state || {},
      timestamp: new Date().toISOString()
    };

    addMessageToUI(assistantMsg);
    conversationHistory.push(assistantMsg);
    saveConversation();

    // Update stats if available
    if (data.run_state) {
      if (data.run_state.total_score) {
        document.getElementById('totalScoreCard').textContent = Math.round(data.run_state.total_score);
      }
      if (data.run_state.recommendation) {
        document.getElementById('recommendationCard').textContent = data.run_state.recommendation;
      }
    }

    // Clear selected issue after use
    sessionStorage.removeItem('selectedIssueId');
    sessionStorage.removeItem('selectedIssue');

  } catch (error) {
    removeLoadingMessage(loadingId);
    const errorMsg = {
      id: 'error-' + Date.now(),
      role: 'assistant',
      content: '抱歉，发生了错误：' + error.message + '。请稍后再试。',
      timestamp: new Date().toISOString()
    };
    addMessageToUI(errorMsg);
  }
}

function addMessageToUI(msg, save = true) {
  const container = document.getElementById('messageList');

  if (msg.role === 'user') {
    container.innerHTML += `
      <div class="flex gap-4 justify-end">
        <div class="max-w-2xl text-right">
          <div class="bg-primary text-white p-5 rounded-2xl rounded-tr-none shadow-md inline-block text-left">
            <p class="leading-relaxed text-[15px]">${escapeHtml(msg.content)}</p>
          </div>
        </div>
        <div class="w-9 h-9 rounded-lg bg-secondary flex-shrink-0 flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-sm">person</span>
        </div>
      </div>
    `;
  } else {
    const actionsHtml = msg.suggestedActions && msg.suggestedActions.length > 0 ? `
      <div class="flex flex-wrap gap-2 mt-3">
        ${msg.suggestedActions.map(action => `
          <button class="suggestion-btn text-[11px] font-bold px-4 py-2 bg-white rounded-full border border-outline-variant/20 hover:border-primary transition-all flex items-center gap-1.5 text-primary"
                  data-action-type="${action.type}"
                  data-action-label="${action.label}"
                  ${action.issue_id ? `data-issue-id="${action.issue_id}"` : ''}>
            <span class="material-symbols-outlined text-[14px]">auto_awesome</span>
            ${action.label}
          </button>
        `).join('')}
      </div>
    ` : '';

    const refsHtml = msg.sourceRefs && msg.sourceRefs.length > 0 ? `
      <div class="mt-4 p-3 bg-white/50 rounded-lg border-l-2 border-tertiary-fixed-dim flex items-start gap-3">
        <span class="material-symbols-outlined text-tertiary text-sm mt-0.5">description</span>
        <div class="text-xs text-secondary leading-normal italic">
          ${msg.sourceRefs.map(ref => `
            <p><strong>${ref.name || ref.type}:</strong> ${ref.excerpt || ''}</p>
          `).join('')}
        </div>
      </div>
    ` : '';

    container.innerHTML += `
      <div class="flex gap-4">
        <div class="w-9 h-9 rounded-lg bg-primary-container flex-shrink-0 flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
        </div>
        <div class="max-w-2xl">
          <div class="bg-surface-container-low p-6 rounded-2xl rounded-tl-none shadow-sm">
            <p class="text-on-surface leading-relaxed text-[15px]">${escapeHtml(msg.content)}</p>
            ${refsHtml}
          </div>
          ${actionsHtml}
        </div>
      </div>
    `;

    // Bind suggestion buttons
    if (msg.suggestedActions && msg.suggestedActions.length > 0) {
      setTimeout(bindSuggestionButtons, 100);
    }
  }

  container.scrollTop = container.scrollHeight;
}

function addLoadingMessage() {
  const container = document.getElementById('messageList');
  const loadingId = 'loading-' + Date.now();
  container.innerHTML += `
    <div id="${loadingId}" class="flex gap-4">
      <div class="w-9 h-9 rounded-lg bg-primary-container flex-shrink-0 flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
      </div>
      <div class="max-w-2xl">
        <div class="bg-surface-container-low p-6 rounded-2xl rounded-tl-none shadow-sm">
          <p class="text-on-surface leading-relaxed text-[15px] italic text-secondary animate-pulse">正在思考...</p>
        </div>
      </div>
    </div>
  `;
  container.scrollTop = container.scrollHeight;
  return loadingId;
}

function removeLoadingMessage(loadingId) {
  const el = document.getElementById(loadingId);
  if (el) el.remove();
}

// ========== Suggestion Buttons ==========
function bindSuggestionButtons() {
  document.querySelectorAll('.suggestion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.actionType;
      const label = btn.dataset.actionLabel;
      const issueId = btn.dataset.issueId;

      if (type === 'focus_issue' && issueId) {
        sessionStorage.setItem('selectedIssueId', issueId);
        document.getElementById('messageInput').value = `请详细说明问题 ${issueId}`;
        document.getElementById('messageInput').focus();
      } else if (type === 'generate_suggestion') {
        document.getElementById('messageInput').value = '请给出详细的修改建议';
        document.getElementById('messageInput').focus();
      } else if (type === 'rerun') {
        handleRerun();
      } else if (type === 'switch_preset') {
        document.getElementById('messageInput').value = '请切换到更严格的评审模式';
        document.getElementById('messageInput').focus();
      } else {
        document.getElementById('messageInput').value = label;
        document.getElementById('messageInput').focus();
      }
    });
  });
}

// ========== Event Listeners ==========
function setupEventListeners() {
  // Send button
  document.getElementById('sendBtn').addEventListener('click', sendMessage);

  // Enter to send (Shift+Enter for newline)
  document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Workflow buttons
  document.getElementById('rerunBtn').addEventListener('click', handleRerun);
  document.getElementById('exportPdfBtn').addEventListener('click', handleExportPdf);
  document.getElementById('shareBtn').addEventListener('click', handleShare);
}

async function handleRerun() {
  if (!sessionId) return;
  if (confirm('确定要重新评审吗？这将清除当前评审进度。')) {
    try {
      await fetch(`${API_BASE}/review/reset?session_id=${sessionId}`, { method: 'POST' });
      sessionStorage.removeItem('conversationHistory');
      sessionStorage.removeItem('lastReport');
      navigateToWorkbench(event);
    } catch (e) {
      alert('重置失败');
    }
  }
}

function handleExportPdf() {
  if (!sessionId) {
    alert('无可用报告');
    return;
  }
  window.open(`${API_BASE}/review/export/pdf/${sessionId}`, '_blank');
}

async function handleShare() {
  if (!sessionId) {
    alert('无可用报告');
    return;
  }
  try {
    const response = await fetch(`${API_BASE}/review/share?session_id=${sessionId}`, { method: 'POST' });
    const data = await response.json();
    const shareUrl = `${window.location.origin}${data.share_url}`;
    await navigator.clipboard.writeText(shareUrl);
    alert(`分享链接已复制到剪贴板:\n${shareUrl}`);
  } catch (e) {
    alert('生成分享链接失败');
  }
}

// ========== Navigation ==========
function navigateToWorkbench(e) {
  if (e) e.preventDefault();
  window.location.href = '/first page code_integrated.html';
}

function navigateToReport(e) {
  if (e) e.preventDefault();
  window.location.href = '/second page/second_page_integrated.html';
}

// ========== Utilities ==========
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function saveConversation() {
  try {
    sessionStorage.setItem('conversationHistory', JSON.stringify(conversationHistory.slice(-50)));
  } catch (e) {}
}

function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}
</script>
