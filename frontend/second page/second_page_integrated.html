<script>
const API_BASE = 'http://localhost:8000/api';
let radarChart = null;

// ========== Init ==========
document.addEventListener('DOMContentLoaded', () => {
  loadReport();
  setupEventListeners();
});

// ========== Load Report ==========
async function loadReport() {
  const sessionId = sessionStorage.getItem('lastSessionId') || getQueryParam('session');

  if (!sessionId) {
    showEmptyState();
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/review/report/${sessionId}`);

    if (!response.ok) {
      if (response.status === 400) {
        showEmptyState('评审尚未完成，请稍后再试');
      } else {
        throw new Error('Failed to load report');
      }
      return;
    }

    const report = await response.json();
    renderReport(report);

  } catch (error) {
    console.error('Error loading report:', error);
    showEmptyState('加载报告失败: ' + error.message);
  }
}

function showEmptyState(message = '请先在工作台创建评审任务') {
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('issuesSection').style.display = 'none';
  document.getElementById('emptyState').classList.remove('hidden');
  document.querySelector('#emptyState p').textContent = message;
}

// ========== Render Report ==========
function renderReport(report) {
  // Title & Meta
  document.getElementById('reportTitle').textContent = `评审报告：${report.project_name || 'PRD Review'}`;
  document.getElementById('reportMeta').textContent = `${report.version || 'v1.0'} • ${report.review_date || new Date().toLocaleDateString()} • 模式: ${report.preset || 'normal'}`;

  // Score Circle
  const score = Math.round(report.total_score || 0);
  const circumference = 2 * Math.PI * 80; // r=80
  const offset = circumference - (score / 100) * circumference;
  document.getElementById('scoreCircle').style.strokeDashoffset = offset;
  document.getElementById('totalScore').textContent = score;

  // Recommendation Badge
  const badge = document.getElementById('recommendationBadge');
  badge.textContent = report.recommendation || 'PENDING';
  if (report.recommendation === 'PASS' || report.recommendation === '通过') {
    badge.className = 'px-5 py-2 rounded-full bg-green-100 text-green-700 text-xs font-bold uppercase tracking-wider';
  } else if (report.recommendation === 'FAIL' || report.recommendation === '不通过') {
    badge.className = 'px-5 py-2 rounded-full bg-error-container text-on-error-container text-xs font-bold uppercase tracking-wider';
  } else {
    badge.className = 'px-5 py-2 rounded-full bg-tertiary-fixed text-on-tertiary-fixed text-xs font-bold uppercase tracking-wider';
  }

  // Summary
  document.getElementById('summaryText').textContent = report.summary || '暂无摘要';

  // Dimension Cards
  renderDimensionCards(report.dimension_scores || []);

  // Radar Chart
  renderRadarChart(report.dimension_scores || []);

  // Issues
  renderIssues(report.issues || []);
}

function renderDimensionCards(dimensions) {
  const container = document.getElementById('dimensionCards');
  container.innerHTML = '';

  const iconMap = {
    'completeness': 'inventory_2',
    '完整性': 'inventory_2',
    'feasibility': 'engineering',
    '可行性': 'engineering',
    'user_value': 'trending_up',
    '用户价值': 'trending_up',
    'risk': 'warning',
    '风险': 'warning',
    'architecture': 'scale',
    '架构': 'scale',
    'logic': 'visibility',
    '逻辑': 'visibility',
    'reasonableness': 'psychology',
    '合理性': 'psychology',
    'priority': 'priority_high',
    '优先级': 'priority_high'
  };

  const descMap = {
    'completeness': '覆盖了全量基础流程与状态定义',
    '完整性': '覆盖了全量基础流程与状态定义',
    'feasibility': '技术实现方案可行性评估',
    '可行性': '技术实现方案可行性评估',
    'user_value': '对用户实际需求的满足程度',
    '用户价值': '对用户实际需求的满足程度',
    'risk': '潜在风险与安全隐患评估',
    '风险': '潜在风险与安全隐患评估',
    'architecture': '系统架构设计合理性',
    '架构': '系统架构设计合理性',
    'logic': '业务逻辑严密性评估',
    '逻辑': '业务逻辑严密性评估',
    'reasonableness': '需求描述合理性评估',
    '合理性': '需求描述合理性评估',
    'priority': '优先级一致性评估',
    '优先级': '优先级一致性评估'
  };

  dimensions.forEach(dim => {
    const name = dim.dimension || 'Unknown';
    const scoreVal = Math.round(dim.score || 0);
    const icon = iconMap[name] || 'circle';
    const desc = descMap[name] || dim.description || '';

    const card = document.createElement('div');
    card.className = 'bg-surface-container-low p-4 rounded-xl group hover:bg-surface-container-lowest transition-all';
    card.innerHTML = `
      <div class="flex justify-between items-start mb-4">
        <div class="w-8 h-8 rounded-lg bg-primary/5 flex items-center justify-center group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-primary text-lg">${icon}</span>
        </div>
        <span class="text-xl font-satoshi font-bold text-primary">${scoreVal}</span>
      </div>
      <h4 class="text-xs font-bold text-primary uppercase tracking-widest mb-2">${name}</h4>
      <p class="text-[11px] text-on-surface-variant leading-relaxed">${desc}</p>
    `;
    container.appendChild(card);
  });
}

function renderRadarChart(dimensions) {
  const ctx = document.getElementById('radarChart').getContext('2d');

  if (radarChart) {
    radarChart.destroy();
  }

  const labels = dimensions.map(d => d.dimension);
  const data = dimensions.map(d => d.score);

  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [{
        label: '维度评分',
        data: data,
        backgroundColor: 'rgba(58, 46, 71, 0.1)',
        borderColor: 'rgba(58, 46, 71, 0.8)',
        borderWidth: 2,
        pointBackgroundColor: 'rgba(58, 46, 71, 0.8)',
        pointBorderColor: '#fff',
        pointHoverBackgroundColor: '#fff',
        pointHoverBorderColor: 'rgba(58, 46, 71, 0.8)',
        fill: true,
        tension: 0.1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true,
          max: 10,
          ticks: {
            stepSize: 2,
            font: { size: 10 },
            color: '#7b757d'
          },
          pointLabels: {
            font: { size: 11, weight: '500' },
            color: '#3a2e47'
          },
          grid: {
            color: 'rgba(0,0,0,0.05)'
          }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function renderIssues(issues) {
  const container = document.getElementById('issuesList');
  container.innerHTML = '';

  // Count by severity
  const counts = { HIGH: 0, MEDIUM: 0, LOW: 0 };
  issues.forEach(issue => {
    const sev = (issue.severity || 'LOW').toUpperCase();
    if (counts[sev] !== undefined) counts[sev]++;
  });

  // Render count badges
  const countsContainer = document.getElementById('issueCounts');
  countsContainer.innerHTML = `
    ${counts.HIGH > 0 ? `
    <div class="flex items-center gap-3 bg-error-container/30 px-5 py-2.5 rounded-lg">
      <span class="w-3 h-3 rounded-full bg-error animate-pulse"></span>
      <span class="text-xs font-bold text-error uppercase tracking-widest">HIGH: ${counts.HIGH}</span>
    </div>` : ''}
    ${counts.MEDIUM > 0 ? `
    <div class="flex items-center gap-3 bg-tertiary-fixed/30 px-5 py-2.5 rounded-lg">
      <span class="w-3 h-3 rounded-full bg-tertiary"></span>
      <span class="text-xs font-bold text-tertiary uppercase tracking-widest">MEDIUM: ${counts.MEDIUM}</span>
    </div>` : ''}
    ${counts.LOW > 0 ? `
    <div class="flex items-center gap-3 bg-surface-container-high px-5 py-2.5 rounded-lg">
      <span class="w-3 h-3 rounded-full bg-on-secondary-container"></span>
      <span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">LOW: ${counts.LOW}</span>
    </div>` : ''}
    ${issues.length === 0 ? '<span class="text-stone-500 text-sm">未发现任何问题</span>' : ''}
  `;

  // Render issue cards
  if (issues.length === 0) {
    container.innerHTML = '<p class="text-center text-stone-500 py-8">太棒了！未发现任何问题。</p>';
    return;
  }

  const severityColors = {
    HIGH: { border: 'border-l-error', badge: 'bg-error-container text-on-error-container', dot: 'bg-error' },
    MEDIUM: { border: 'border-l-tertiary', badge: 'bg-tertiary-fixed/30 text-tertiary', dot: 'bg-tertiary' },
    LOW: { border: 'border-l-secondary', badge: 'bg-surface-container text-on-surface-variant', dot: 'bg-secondary' }
  };

  issues.forEach((issue, idx) => {
    const sev = (issue.severity || 'LOW').toUpperCase();
    const colors = severityColors[sev] || severityColors.LOW;
    const displayId = issue.display_id || issue.id || `Issue-${idx + 1}`;
    const title = issue.title || '未命名问题';
    const dimension = issue.dimension || '';
    const description = issue.description || '';
    const section = issue.source_section || '';

    const card = document.createElement('div');
    card.className = `bg-surface-container-lowest border-l-4 ${colors.border} p-8 rounded-xl editorial-shadow hover:translate-x-1 transition-transform cursor-pointer`;
    card.onclick = () => selectIssue(issue);

    card.innerHTML = `
      <div class="flex justify-between items-start mb-4">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest opacity-60">${displayId}</span>
            ${section ? `<span class="text-xs font-medium text-on-surface-variant opacity-60">• ${section}</span>` : ''}
          </div>
          <h3 class="text-lg font-satoshi font-semibold text-primary">${title}</h3>
          ${dimension ? `<span class="text-xs text-stone-500 mt-1">维度: ${dimension}</span>` : ''}
        </div>
        <span class="px-4 py-1.5 rounded-full ${colors.badge} text-[10px] font-bold uppercase tracking-widest">${sev}</span>
      </div>
      <p class="text-[15px] text-on-surface-variant leading-relaxed">${description}</p>
      ${issue.suggestion ? `<p class="text-[14px] text-primary mt-3"><strong>建议:</strong> ${issue.suggestion}</p>` : ''}
    `;
    container.appendChild(card);
  });
}

// ========== Issue Selection ==========
function selectIssue(issue) {
  sessionStorage.setItem('selectedIssueId', issue.id || issue.display_id);
  sessionStorage.setItem('selectedIssue', JSON.stringify(issue));
  navigateToAssistant(event);
}

// ========== Event Listeners ==========
function setupEventListeners() {
  // Download PDF
  document.getElementById('downloadBtn').addEventListener('click', async () => {
    const sessionId = sessionStorage.getItem('lastSessionId');
    if (!sessionId) return alert('无可用报告');
    window.open(`${API_BASE}/review/export/pdf/${sessionId}`, '_blank');
  });

  // Export (share)
  document.getElementById('exportBtn').addEventListener('click', async () => {
    const sessionId = sessionStorage.getItem('lastSessionId');
    if (!sessionId) return alert('无可用报告');
    try {
      const response = await fetch(`${API_BASE}/review/share?session_id=${sessionId}`, { method: 'POST' });
      const data = await response.json();
      const shareUrl = `${window.location.origin}${data.share_url}`;
      await navigator.clipboard.writeText(shareUrl);
      alert(`分享链接已复制到剪贴板:\n${shareUrl}`);
    } catch (e) {
      alert('生成分享链接失败');
    }
  });

  // Rerun (redirect to workbench)
  document.getElementById('rerunBtn').addEventListener('click', () => {
    navigateToWorkbench(event);
  });
}

// ========== Navigation ==========
function navigateToWorkbench(e) {
  if (e) e.preventDefault();
  window.location.href = '/first page code_integrated.html';
}

function navigateToAssistant(e) {
  if (e) e.preventDefault();
  window.location.href = '/third page/third_page_integrated.html';
}

// ========== Utilities ==========
function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}
</script>
